<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Travel Itinerary Builder</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --gray-800: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: var(--gray-800);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .template-panel {
            background: #fef08a;
            border: 2px dashed #ca8a04;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        h1, h2, h3, h4, h5 { margin-top: 0; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-success { background-color: var(--success); }
        .btn-secondary { background-color: #475569; }
        .btn-secondary:hover { background-color: #334155; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--gray-700);
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Form Layout Structuring */
        .section-block {
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .subsection-block {
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            background: white;
        }
        .field-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        /* Views */
        #editor-view { display: block; }
        #preview-view { display: none; }

        /* Printable Paper Presentation */
        #print-preview {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 500px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .preview-logo {
            max-height: 80px;
            max-width: 200px;
            object-fit: contain;
        }
        .preview-section {
            margin-bottom: 30px;
        }
        .section-title-container {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid var(--gray-200);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .section-icon {
            max-height: 40px;
            max-width: 40px;
            object-fit: contain;
        }
        .preview-subsection {
            margin-left: 20px;
            margin-bottom: 15px;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            background: var(--gray-100);
            padding: 15px;
            border-radius: 6px;
        }
        .field-item strong {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
        }

        /* Clean Print Processing */
        @media print {
            body { background: white; padding: 0; }
            .no-print-bar, .btn, button, input, select, hr, .panel {
                display: none !important;
            }
            #preview-view { display: block !important; }
            #print-preview {
                box-shadow: none;
                padding: 0;
            }
            .preview-section { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="editor-view" class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>🧳 Itinerary Management</h2>
            <button class="btn btn-sm btn-secondary" onclick="toggleTemplateEditor()">⚙️ Edit Master Form Template</button>
        </div>

        <div id="template-editor-panel" class="template-panel">
            <h3> master Template Editor</h3>
            <p style="font-size: 13px; color: #854d0e; margin-top: -8px;">Changes made here set up the default layout fields for all new itineraries.</p>
            <div id="template-sections-container"></div>
            <button class="btn btn-sm" onclick="addTemplateSection()">+ Add New Section to Template</button>
            <button class="btn btn-sm btn-success" style="float: right;" onclick="toggleTemplateEditor()">Save & Close Template</button>
            <div style="clear: both;"></div>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--gray-200);">
        
        <div style="display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 25px;">
            <div style="flex-grow: 1; min-width: 200px;">
                <label for="itinerary-select">Active Itinerary Selection:</label>
                <select id="itinerary-select" onchange="switchItinerary()"></select>
            </div>
            <button class="btn btn-success" onclick="createNewItineraryFromTemplate()">+ New Itinerary</button>
            <button class="btn btn-danger" onclick="deleteCurrentItinerary()">🗑️ Delete</button>
            <button class="btn" style="background-color: #059669;" onclick="showPreviewMode()">👁️ View Ready Itinerary</button>
        </div>

        <div class="form-group" style="background: var(--gray-100); padding: 15px; border-radius: 8px;">
            <label>Upload Header Company Logo</label>
            <input type="file" accept="image/*" onchange="handleMainLogo(event)">
        </div>

        <h3 style="margin-top: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">✍️ Fill Active Itinerary Data</h3>
        
        <div class="form-group" style="margin-top: 15px;">
            <label>Trip Title</label>
            <input type="text" id="input-trip-title" oninput="updateActiveMeta('title', this.value)">
        </div>
        <div class="form-group">
            <label>Trip Subtitle / Description</label>
            <input type="text" id="input-trip-subtitle" oninput="updateActiveMeta('subtitle', this.value)">
        </div>

        <div id="active-data-form-container"></div>
        
        <div style="margin-top: 20px; text-align: right;">
            <button class="btn btn-success" style="font-size: 16px; padding: 12px 24px;" onclick="showPreviewMode()">👁️ View Ready Itinerary</button>
        </div>
    </div>


    <div id="preview-view">
        <div class="no-print-bar" style="display: flex; justify-content: space-between; margin-bottom: 20px; background: #e2e8f0; padding: 12px; border-radius: 8px;">
            <button class="btn btn-secondary" onclick="showEditorMode()">⬅️ Back to Editor</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="toggleTemplateEditor(); showEditorMode();">🛠️ Edit Fields & Sections of this Itinerary</button>
                <button class="btn" style="background-color: #1e293b;" onclick="window.print()">🖨️ Print Document</button>
            </div>
        </div>

        <div id="print-preview">
            <div class="preview-header">
                <div>
                    <h1 id="view-title">Template Trip Itinerary</h1>
                    <p id="view-subtitle">Prepared for your upcoming adventure</p>
                </div>
                <img id="main-logo-view" class="preview-logo" src="https://via.placeholder.com/150x80?text=Your+Logo" alt="Logo">
            </div>

            <div id="preview-render-area"></div>
        </div>
    </div>

</div>

<script>
    // Initial Fallback structure
    const defaultTemplate = [
        {
            title: "Trip Details & Overview",
            logo: "https://cdn-icons-png.flaticon.com/512/826/826070.png",
            subsections: [
                { title: "General Information", fields: [{ label: "Destinations" }, { label: "Start Date" }, { label: "End Date" }] }
            ]
        },
        {
            title: "Flight Bookings",
            logo: "https://cdn-icons-png.flaticon.com/512/784/784307.png",
            subsections: [
                { title: "Outbound Details", fields: [{ label: "From" }, { label: "To" }, { label: "Flight Options & Price" }] }
            ]
        },
        {
            title: "Hotel Accommodations",
            logo: "https://cdn-icons-png.flaticon.com/512/2933/2933772.png",
            subsections: [
                { title: "Lodging Specs", fields: [{ label: "Hotel Name" }, { label: "Price for each" }] }
            ]
        }
    ];

    // Core Architecture States
    let masterTemplate = JSON.parse(localStorage.getItem('masterTemplate')) || defaultTemplate;
    let itineraries = JSON.parse(localStorage.getItem('itineraries')) || {
        "itinerary_1": {
            title: "Sample Europe Escape",
            subtitle: "Prepared for Client Data",
            sections: JSON.parse(JSON.stringify(masterTemplate))
        }
    };
    
    let currentItineraryId = Object.keys(itineraries)[0];
    let globalLogoSrc = localStorage.getItem('globalLogoSrc') || "https://via.placeholder.com/150x80?text=Your+Logo";

    window.onload = function() {
        populateDropdown();
        renderTemplateEditor();
        renderActiveDataFormAndPreview();
    };

    function saveState() {
        localStorage.setItem('masterTemplate', JSON.stringify(masterTemplate));
        localStorage.setItem('itineraries', JSON.stringify(itineraries));
        localStorage.setItem('globalLogoSrc', globalLogoSrc);
    }

    function showPreviewMode() {
        renderActiveDataFormAndPreview();
        document.getElementById('editor-view').style.display = 'none';
        document.getElementById('preview-view').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function showEditorMode() {
        document.getElementById('editor-view').style.display = 'block';
        document.getElementById('preview-view').style.display = 'none';
    }

    function toggleTemplateEditor() {
        const panel = document.getElementById('template-editor-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        if(panel.style.display === 'block') { panel.scrollIntoView({ behavior: 'smooth' }); }
    }

    function populateDropdown() {
        const select = document.getElementById('itinerary-select');
        select.innerHTML = '';
        for (let id in itineraries) {
            let opt = document.createElement('option');
            opt.value = id;
            opt.innerText = itineraries[id].title;
            opt.selected = (id === currentItineraryId);
            select.appendChild(opt);
        }
        // Update input titles mapping text
        document.getElementById('input-trip-title').value = itineraries[currentItineraryId].title;
        document.getElementById('input-trip-subtitle').value = itineraries[currentItineraryId].subtitle;
    }

    function createNewItineraryFromTemplate() {
        const newId = "itinerary_" + Date.now();
        const clonedSections = JSON.parse(JSON.stringify(masterTemplate));
        clonedSections.forEach(s => s.subsections.forEach(sub => sub.fields.forEach(f => f.value = "")));

        itineraries[newId] = {
            title: "Untitled New Itinerary",
            subtitle: "Enter itinerary descriptions here",
            sections: clonedSections
        };
        currentItineraryId = newId;
        saveState();
        populateDropdown();
        renderActiveDataFormAndPreview();
    }

    function deleteCurrentItinerary() {
        if(Object.keys(itineraries).length <= 1) {
            alert("You must keep at least one active itinerary record.");
            return;
        }
        if(confirm("Are you sure you want to permanently delete this itinerary?")){
            delete itineraries[currentItineraryId];
            currentItineraryId = Object.keys(itineraries)[0];
            saveState();
            populateDropdown();
            renderActiveDataFormAndPreview();
        }
    }

    function switchItinerary() {
        currentItineraryId = document.getElementById('itinerary-select').value;
        document.getElementById('input-trip-title').value = itineraries[currentItineraryId].title;
        document.getElementById('input-trip-subtitle').value = itineraries[currentItineraryId].subtitle;
        renderActiveDataFormAndPreview();
    }

    function updateActiveMeta(key, val) {
        itineraries[currentItineraryId][key] = val;
        if(key === 'title') {
            document.getElementById('itinerary-select').options[document.getElementById('itinerary-select').selectedIndex].text = val;
        }
        saveState();
    }

    function handleMainLogo(event) {
        const reader = new FileReader();
        reader.onload = function(){
            globalLogoSrc = reader.result;
            document.getElementById('main-logo-view').src = globalLogoSrc;
            saveState();
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function handleTemplateSectionLogo(event, sectionIdx) {
        const reader = new FileReader();
        reader.onload = function(){
            masterTemplate[sectionIdx].logo = reader.result;
            saveState();
            renderTemplateEditor();
            renderActiveDataFormAndPreview();
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    /* ENGINE 1: MASTER TEMPLATE EDITOR BUILDER */
    function renderTemplateEditor() {
        const container = document.getElementById('template-sections-container');
        container.innerHTML = '';

        masterTemplate.forEach((section, sIdx) => {
            let div = document.createElement('div');
            div.className = 'section-block';
            div.style.background = '#fefeff';
            div.innerHTML = `
                <div class="field-row">
                    <input type="text" value="${section.title}" placeholder="Section Title" oninput="masterTemplate[${sIdx}].title = this.value; saveState(); renderActiveDataFormAndPreview();" style="font-weight:bold;">
                    <button class="btn btn-sm btn-danger" onclick="removeTemplateSection(${sIdx})">Remove Section</button>
                </div>
                <div class="form-group" style="margin-top:5px;">
                    <label style="font-size:11px;">Section Logo / Icon image:</label>
                    <input type="file" accept="image/*" onchange="handleTemplateSectionLogo(event, ${sIdx})">
                </div>
                <div class="template-sub-hook" style="margin-left: 15px;"></div>
                <button class="btn btn-sm" style="margin-top:10px; background-color:#93c5fd; color:#1e3a8a;" onclick="addTemplateSubSection(${sIdx})">+ Add Subsection Template</button>
            `;

            section.subsections.forEach((sub, subIdx) => {
                let subDiv = document.createElement('div');
                subDiv.className = 'subsection-block';
                subDiv.innerHTML = `
                    <div class="field-row">
                        <input type="text" value="${sub.title}" placeholder="Subsection Title" oninput="masterTemplate[${sIdx}].subsections[${subIdx}].title = this.value; saveState(); renderActiveDataFormAndPreview();">
                        <button class="btn btn-sm btn-danger" onclick="removeTemplateSubSection(${sIdx}, ${subIdx})">X</button>
                    </div>
                    <div class="template-fields-hook" style="margin-top:10px;"></div>
                    <button class="btn btn-sm" style="margin-top:5px; background-color:#cbd5e1; color:black;" onclick="addTemplateField(${sIdx}, ${subIdx})">+ Add Field</button>
                `;

                sub.fields.forEach((field, fIdx) => {
                    let fRow = document.createElement('div');
                    fRow.className = 'field-row';
                    fRow.innerHTML = `
                        <input type="text" value="${field.label}" placeholder="Field Label" oninput="masterTemplate[${sIdx}].subsections[${subIdx}].fields[${fIdx}].label = this.value; saveState(); renderActiveDataFormAndPreview();">
                        <button class="btn btn-sm btn-danger" onclick="removeTemplateField(${sIdx}, ${subIdx}, ${fIdx})">-</button>
                    `;
                    subDiv.querySelector('.template-fields-hook').appendChild(fRow);
                });

                div.querySelector('.template-sub-hook').appendChild(subDiv);
            });

            container.appendChild(div);
        });
    }

    function addTemplateSection() { masterTemplate.push({ title: "New Custom Section", logo: "", subsections: [] }); saveState(); renderTemplateEditor(); }
    function removeTemplateSection(sIdx) { masterTemplate.splice(sIdx, 1); saveState(); renderTemplateEditor(); renderActiveDataFormAndPreview(); }
    function addTemplateSubSection(sIdx) { masterTemplate[sIdx].subsections.push({ title: "New Subsection", fields: [] }); saveState(); renderTemplateEditor(); }
    function removeTemplateSubSection(sIdx, subIdx) { masterTemplate[sIdx].subsections.splice(subIdx, 1); saveState(); renderTemplateEditor(); renderActiveDataFormAndPreview(); }
    function addTemplateField(sIdx, subIdx) { masterTemplate[sIdx].subsections[subIdx].fields.push({ label: "New Field" }); saveState(); renderTemplateEditor(); }
    function removeTemplateField(sIdx, subIdx, fIdx) { masterTemplate[sIdx].subsections[subIdx].fields.splice(fIdx, 1); saveState(); renderTemplateEditor(); renderActiveDataFormAndPreview(); }


    /* ENGINE 2: MAP CONTENT DATA */
    function renderActiveDataFormAndPreview() {
        const itinerary = itineraries[currentItineraryId];
        
        document.getElementById('view-title').innerText = itinerary.title;
        document.getElementById('view-subtitle').innerText = itinerary.subtitle;
        document.getElementById('main-logo-view').src = globalLogoSrc;

        const formContainer = document.getElementById('active-data-form-container');
        const previewContainer = document.getElementById('preview-render-area');
        
        formContainer.innerHTML = '';
        previewContainer.innerHTML = '';

        masterTemplate.forEach((tSection, sIdx) => {
            if (!itinerary.sections[sIdx]) {
                itinerary.sections[sIdx] = { title: tSection.title, logo: tSection.logo, subsections: [] };
            }
            let section = itinerary.sections[sIdx];
            section.title = tSection.title;
            section.logo = tSection.logo;

            let sBlock = document.createElement('div');
            sBlock.className = 'section-block';
            sBlock.innerHTML = `<h4>📁 Section: ${section.title || 'Untitled'}</h4><div class="sub-hook"></div>`;
            
            let sPreview = document.createElement('div');
            sPreview.className = 'preview-section';
            sPreview.innerHTML = `
                <div class="section-title-container">
                    ${section.logo ? `<img class="section-icon" src="${section.logo}">` : ''}
                    <h2>${section.title || 'Untitled Section'}</h2>
                </div>
                <div class="preview-subsections-hook"></div>
            `;

            tSection.subsections.forEach((tSub, subIdx) => {
                if(!section.subsections[subIdx]) {
                    section.subsections[subIdx] = { title: tSub.title, fields: [] };
                }
                let sub = section.subsections[subIdx];
                sub.title = tSub.title;

                let subBlock = document.createElement('div');
                subBlock.className = 'subsection-block';
                subBlock.innerHTML = `<h5>📄 ${sub.title || 'Untitled'}</h5><div class="fields-hook"></div>`;

                let subPreview = document.createElement('div');
                subPreview.className = 'preview-subsection';
                subPreview.innerHTML = `<h3>${sub.title || 'Untitled Subsection'}</h3><div class="preview-grid fields-preview-hook"></div>`;

                tSub.fields.forEach((tField, fIdx) => {
                    if(!sub.fields[fIdx]) {
                        sub.fields[fIdx] = { label: tField.label, value: "" };
                    }
                    let field = sub.fields[fIdx];
                    field.label = tField.label;

                    let fRow = document.createElement('div');
                    fRow.className = 'form-group';
                    fRow.innerHTML = `
                        <label style="font-size:12px; color:#4b5563;">${field.label}</label>
                        <input type="text" value="${field.value || ''}" oninput="itineraries['${currentItineraryId}'].sections[${sIdx}].subsections[${subIdx}].fields[${fIdx}].value = this.value; saveState();">
                    `;
                    subBlock.querySelector('.fields-hook').appendChild(fRow);

                    if (field.value) { 
                        let fPreview = document.createElement('div');
                        fPreview.className = 'field-item';
                        fPreview.innerHTML = `<strong>${field.label || 'Field'}</strong> <span>${field.value}</span>`;
                        subPreview.querySelector('.fields-preview-hook').appendChild(fPreview);
                    }
                });

                if(sub.fields.length > tSub.fields.length) sub.fields.splice(tSub.fields.length);

                sBlock.querySelector('.sub-hook').appendChild(subBlock);
                sPreview.querySelector('.preview-subsections-hook').appendChild(subPreview);
            });

            if(section.subsections.length > tSection.subsections.length) section.subsections.splice(tSection.subsections.length);

            formContainer.appendChild(sBlock);
            previewContainer.appendChild(sPreview);
        });

        if(itinerary.sections.length > masterTemplate.length) itinerary.sections.splice(masterTemplate.length);
    }
</script>

</body>
</html>
